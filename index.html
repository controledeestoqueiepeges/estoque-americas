<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DE ESTOQUE | v7.9</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --roxo: #5a189a; --lilas: #9d4edd; --escuro: #1a132e;
            --cinza-fundo: #f4f5f8; --cinza-borda: #d1d5db;
            --verde: #2a9d8f; --vermelho: #e63946; --texto: #374151;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--cinza-fundo); color: var(--texto); overflow-x: hidden; }

        #layout-sistema { display: none; min-height: 100vh; }
        header { background: var(--escuro); color: white; height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        header img { height: 28px; filter: brightness(0) invert(1); }

        .sidebar { position: fixed; top: 65px; left: 0; bottom: 0; width: 240px; background: #22163f; padding: 20px; }
        .nav-btn { background: transparent; border: none; color: #cbb2ff; padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .nav-btn.active { background: var(--roxo); color: white; }

        main { margin-left: 240px; margin-top: 65px; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--cinza-borda); border-radius: 8px; margin-bottom: 10px; font-size: 15px; }
        
        .btn-principal { background: var(--roxo); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }

        .badge-mov { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; }
        .bg-entrada { background: var(--verde); }
        .bg-saida { background: var(--vermelho); }

        .alert-item { background: #fee2e2; border-left: 4px solid var(--vermelho); padding: 15px; margin-bottom: 10px; color: #b91c1c; border-radius: 8px; font-size: 14px; }
        .log-row { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        
        .filtros-mov { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px; }
            .nav-btn span { display: none; }
            main { margin-left: 60px; }
            .filtros-mov { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body onkeydown="app.globalEnter(event)">

    <div id="section-auth" class="auth-container" style="max-width:400px; margin: 80px auto; text-align:center;">
        <img src="https://www.institutoamericas.org/wp-content/uploads/2025/09/logo-instituto-americas.svg" style="width:250px; margin-bottom:20px">
        <div id="card-login" class="card">
            <h3 style="color:var(--roxo)">Entrar</h3>
            <input type="text" id="login-user" placeholder="Usuário">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-principal" onclick="app.login()">ACESSAR</button>
            <p><a href="#" onclick="app.toggleAuth()" style="color:var(--roxo); text-decoration:none; font-size:14px">Novo Cadastro</a></p>
        </div>
        <div id="card-cad" class="card hidden">
            <h3 style="color:var(--roxo)">Novo Cadastro</h3>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="password" id="cad-pass" placeholder="Senha" maxlength="8">
            <button class="btn-principal" onclick="app.cadastrar()">CADASTRAR</button>
            <p><a href="#" onclick="app.toggleAuth()" style="color:gray; text-decoration:none">Voltar</a></p>
        </div>
    </div>

    <div id="layout-sistema">
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img src="https://www.institutoamericas.org/wp-content/uploads/2025/09/logo-instituto-americas.svg">
                <span style="font-weight:bold">ESTOQUE</span>
            </div>
            <div style="display:flex; align-items:center; gap:15px">
                <small id="user-info" style="font-weight:600"></small>
                <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:4px 8px; border-radius:4px; cursor:pointer">Sair</button>
            </div>
        </header>

        <aside class="sidebar">
            <button id="nav-dash" class="nav-btn active" onclick="app.nav('dash')">🏠 <span>Início</span></button>
            <button id="nav-est" class="nav-btn" onclick="app.nav('est')">🔍 <span>Estoque Atual</span></button>
            <button id="nav-mov" class="nav-btn" onclick="app.nav('mov')">🔄 <span>Movimentação</span></button>
            <button id="nav-ent" class="nav-btn" onclick="app.nav('ent')">📥 <span>Entrada</span></button>
            <button id="nav-sai" class="nav-btn" onclick="app.nav('sai')">📤 <span>Saída</span></button>
            <button id="nav-rel" class="nav-btn" onclick="app.nav('rel')">📋 <span>Logs</span></button>
            <button id="nav-adm" class="nav-btn hidden" onclick="app.nav('adm')">⚙️ <span>Cadastro de Usuários</span></button>
        </aside>

        <main>
            <div id="v-dash" class="view">
                <h3>Vencimentos Críticos</h3>
                <div id="alertas-vencimento"></div>
                <div class="card" style="text-align:center">
                    <h1 id="count-itens" style="margin:0; color:var(--roxo)">0</h1>
                    <p style="margin:0; color:gray">Itens em Estoque</p>
                </div>
            </div>

            <div id="v-mov" class="view hidden">
                <div class="card">
                    <h3>Histórico de Movimentação</h3>
                    <div class="filtros-mov">
                        <div><label><small>Início</small></label><input type="date" id="filtro-inicio" onchange="app.renderMov()"></div>
                        <div><label><small>Fim</small></label><input type="date" id="filtro-fim" onchange="app.renderMov()"></div>
                        <button class="btn-excel" onclick="app.exportarExcel()">📗 Exportar Excel</button>
                    </div>
                    <input type="text" id="busca-mov" placeholder="Buscar material..." onkeyup="app.renderMov()">
                    <div id="lista-movimentacao" style="max-height:500px; overflow-y:auto"></div>
                </div>
            </div>

            <div id="v-est" class="view hidden">
                <div class="card">
                    <h3>Estoque em Tempo Real</h3>
                    <input type="text" id="busca" placeholder="Filtrar..." onkeyup="app.renderEstoque()">
                    <table style="width:100%; border-collapse:collapse" border="1" bordercolor="#eee">
                        <thead style="background:#f9f9f9"><tr><th>Cód</th><th>Material</th><th>Validade</th></tr></thead>
                        <tbody id="lista-est" style="text-align:center"></tbody>
                    </table>
                </div>
            </div>

            <div id="v-ent" class="view hidden">
                <div class="card"><h3>Entrada</h3><input type="text" id="ent-cod" placeholder="Código"><input type="text" id="ent-nome" placeholder="Nome"><input type="date" id="ent-venc"><button class="btn-principal" onclick="app.dbSalvar()">SALVAR</button></div>
            </div>
            <div id="v-sai" class="view hidden">
                <div class="card"><h3>Saída</h3><input type="text" id="sai-cod" placeholder="Código"><button class="btn-principal" style="background:var(--vermelho)" onclick="app.dbRemover()">DAR BAIXA</button></div>
            </div>
            <div id="v-rel" class="view hidden">
                <div class="card"><h3>Logs de Sistema</h3><div id="lista-logs"></div></div>
            </div>

            <div id="v-adm" class="view hidden">
                <div class="card">
                    <h3>Gestão de Usuários</h3>
                    <div id="lista-users"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDfmAU3fRhjqLpeOvED3Hb1ohQ0XKXBWpA",
            authDomain: "iepeges.firebaseapp.com",
            databaseURL: "https://iepeges-default-rtdb.firebaseio.com",
            projectId: "iepeges",
            storageBucket: "iepeges.firebasestorage.app",
            messagingSenderId: "722436445499",
            appId: "1:722436445499:web:e4c968164056477d44d31e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const app = {
            user: null, viewAtiva: 'login', dados: {}, 

            init() {
                db.ref('/').on('value', snap => {
                    this.dados = snap.val() || {};
                    this.renderEstoque(); this.renderLogs(); this.renderMov(); this.renderAdmin(); this.checkVencimento();
                });
            },

            login() {
                const u = document.getElementById('login-user').value.toLowerCase().trim();
                const p = document.getElementById('login-pass').value.trim();
                if(u === 'iepeges' && p === 'itc@123@') {
                    this.user = { nome: 'MASTER', login: 'iepeges', role: 'admin' };
                    this.entrarSistema(); return;
                }
                const lista = this.dados.usuarios ? Object.values(this.dados.usuarios) : [];
                const found = lista.find(x => x.login === u && x.pass === p);
                if(found) { this.user = found; this.entrarSistema(); } else { alert("Acesso negado."); }
            },

            entrarSistema() {
                document.getElementById('section-auth').classList.add('hidden');
                document.getElementById('layout-sistema').style.display = 'block';
                document.getElementById('user-info').innerText = this.user.nome;
                if(this.user.role === 'admin') document.getElementById('nav-adm').classList.remove('hidden');
                this.nav('dash');
            },

            renderAdmin() {
                const container = document.getElementById('lista-users');
                if(!container) return;
                const isMaster = (this.user && this.user.login === 'iepeges');
                const users = this.dados.usuarios ? Object.entries(this.dados.usuarios) : [];
                
                container.innerHTML = users.map(([key, u]) => `
                    <div class="log-row">
                        <div><b>${u.nome}</b><br><small>Login: ${u.login}</small></div>
                        <div style="display:flex; gap:8px">
                            <select onchange="app.setRole('${key}', this.value)" ${isMaster ? '' : 'disabled'} style="width:90px; padding:4px; margin:0">
                                <option value="user" ${u.role === 'user' ? 'selected' : ''}>Padrão</option>
                                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                            ${isMaster ? `<button onclick="app.mudarSenha('${key}')" title="Alterar Senha">🔑</button>` : ''}
                            <button onclick="app.delUser('${key}')" style="color:red">🗑️</button>
                        </div>
                    </div>
                `).join('');
            },

            mudarSenha(key) {
                const nova = prompt("Digite a nova senha para este usuário:");
                if(nova && nova.length >= 4) {
                    db.ref('usuarios/' + key).update({ pass: nova });
                    alert("Senha alterada com sucesso!");
                }
            },

            renderMov() {
                const container = document.getElementById('lista-movimentacao');
                const busca = document.getElementById('busca-mov').value.toLowerCase();
                const inicio = document.getElementById('filtro-inicio').value;
                const fim = document.getElementById('filtro-fim').value;
                
                let movs = this.dados.logs ? Object.values(this.dados.logs).reverse() : [];
                movs = movs.filter(l => (l.acao === 'ENTRADA' || l.acao === 'SAÍDA'));

                if(busca) movs = movs.filter(l => l.desc.toLowerCase().includes(busca));
                if(inicio) movs = movs.filter(l => new Date(l.data.split(',')[0].split('/').reverse().join('-')) >= new Date(inicio));
                if(fim) movs = movs.filter(l => new Date(l.data.split(',')[0].split('/').reverse().join('-')) <= new Date(fim));

                container.innerHTML = movs.map(l => `
                    <div class="log-row">
                        <span><span class="badge-mov ${l.acao === 'ENTRADA' ? 'bg-entrada' : 'bg-saida'}">${l.acao}</span> <b>${l.desc}</b></span>
                        <div style="text-align:right"><small>${l.data}</small><br><small>Por: ${l.user}</small></div>
                    </div>`).join('');
            },

            exportarExcel() {
                const container = document.getElementById('lista-movimentacao');
                const rows = Array.from(container.querySelectorAll('.log-row'));
                const data = rows.map(r => ({
                    'Movimento': r.querySelector('.badge-mov').innerText,
                    'Material': r.querySelector('b').innerText,
                    'Data/Hora': r.querySelector('small').innerText,
                    'Usuário': r.querySelectorAll('small')[1].innerText.replace('Por: ', '')
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Movimentação");
                XLSX.writeFile(wb, "Relatorio_Movimentacao.xlsx");
            },

            // Funções de apoio
            nav(v) { 
                document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
                document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
                document.getElementById('v-'+v).classList.remove('hidden');
                document.getElementById('nav-'+v).classList.add('active');
            },
            log(acao, desc) { db.ref('logs').push({ data: new Date().toLocaleString('pt-BR'), user: this.user.nome, acao, desc }); },
            dbSalvar() {
                const c = document.getElementById('ent-cod').value, n = document.getElementById('ent-nome').value, v = document.getElementById('ent-venc').value;
                if(!c || !n) return alert("Preencha!");
                db.ref('materiais/'+c).set({ cod:c, nome:n, venc:v });
                this.log('ENTRADA', n + ' ('+c+')');
                alert("Salvo!");
            },
            dbRemover() {
                const c = document.getElementById('sai-cod').value;
                const item = this.dados.materiais[c];
                if(!item) return alert("Não achei");
                if(confirm("Confirmar?")) { db.ref('materiais/'+c).remove(); this.log('SAÍDA', item.nome + ' ('+c+')'); }
            },
            checkVencimento() {
                const container = document.getElementById('alertas-vencimento');
                container.innerHTML = "";
                const mats = this.dados.materiais ? Object.values(this.dados.materiais) : [];
                mats.forEach(m => {
                    if(!m.venc) return;
                    const diff = Math.ceil((new Date(m.venc) - new Date()) / (1000*60*60*24));
                    if(diff <= 10) container.innerHTML += `<div class="alert-item"><b>${m.nome.toUpperCase()}</b> (${m.cod}) - Vencimento: ${m.venc.split('-').reverse().join('/')}</div>`;
                });
            },
            renderEstoque() {
                const b = document.getElementById('busca').value.toLowerCase();
                const mats = this.dados.materiais ? Object.values(this.dados.materiais) : [];
                document.getElementById('lista-est').innerHTML = mats.filter(m => m.nome.toLowerCase().includes(b)).map(m => `<tr><td>${m.cod}</td><td>${m.nome}</td><td>${m.venc || '-'}</td></tr>`).join('');
                document.getElementById('count-itens').innerText = mats.length;
            },
            renderLogs() {
                const lgs = this.dados.logs ? Object.values(this.dados.logs).reverse() : [];
                document.getElementById('lista-logs').innerHTML = lgs.slice(0, 30).map(l => `<div class="log-row"><span>${l.data} - ${l.user}: ${l.acao}</span></div>`).join('');
            },
            setRole(key, r) { db.ref('usuarios/'+key).update({ role: r }); },
            delUser(k) { if(confirm("Excluir?")) db.ref('usuarios/'+k).remove(); },
            toggleAuth() { document.getElementById('card-login').classList.toggle('hidden'); document.getElementById('card-cad').classList.toggle('hidden'); },
            cadastrar() {
                const n = document.getElementById('cad-nome').value, p = document.getElementById('cad-pass').value;
                const partes = n.split(' '), login = (partes[0][0] + (partes[partes.length-1] || "")).toLowerCase();
                db.ref('usuarios').push({ nome: n, login, pass: p, role: 'user' });
                alert("Login: " + login); this.toggleAuth();
            }
        };
        app.init();
    </script>
</body>
</html>
